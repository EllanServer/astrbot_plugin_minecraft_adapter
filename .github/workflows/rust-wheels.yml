name: Build Rust wheels

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    paths:
      - "rust/**"
      - "pyproject.toml"
      - ".github/workflows/rust-wheels.yml"
  workflow_dispatch:

permissions:
  contents: write  # required for softprops/action-gh-release to upload release assets

jobs:
  build-wheels:
    name: Build wheel · ${{ matrix.platform.label }} · cp${{ matrix.python-version }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        platform:
          - os: ubuntu-latest
            label: linux-x86_64
            arch: x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            arch: aarch64
          - os: macos-14
            label: macos-arm64
            arch: arm64
          - os: windows-latest
            label: windows-x86_64
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.arch }}-unknown-linux-gnu

      - name: Build wheel (maturin)
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --manifest-path rust/Cargo.toml --out dist
          manylinux: auto

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: mine_sentinel_rs-wheel-${{ matrix.platform.label }}-cp${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build sdist (maturin)
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path rust/Cargo.toml --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: mine_sentinel_rs-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Release to GitHub
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl dist/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
